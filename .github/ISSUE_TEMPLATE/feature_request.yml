name: Feature request
description: Suggest a product improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What trading-helper workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Dashboard/UI
        - Market data
        - Indicators/signals
        - AI assistant
        - Documentation
        - Other
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries
      options:
        - label: This request does not require broker order execution.
          required: true
